name: Build & Release APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Flutter APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Java ────────────────────────────────────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ── 3. Flutter ─────────────────────────────────────────────────────────
      # Use latest stable Flutter — no version pin, no cache
      # pubspec.yaml uses broad SDK >=3.4.0 to accept whatever stable ships
      - name: Set up Flutter (latest stable)
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: false

      # ── 4. Verify Flutter & Dart version ──────────────────────────────────
      - name: Verify Flutter version
        run: flutter --version

      # ── 5. Dependencies ────────────────────────────────────────────────────
      # pubspec.lock is deleted from repo — fresh resolution every build
      - name: Install Flutter dependencies
        working-directory: mobile
        run: flutter pub get

      # ── 6. Build ───────────────────────────────────────────────────────────
      - name: Build release APK
        working-directory: mobile
        run: flutter build apk --release

      # ── 7. Rename APK ──────────────────────────────────────────────────────
      - name: Rename APK
        run: |
          cp mobile/build/app/outputs/flutter-apk/app-release.apk \
             mediconnect-v1.0.0.apk

      # ── 8. Upload artifact (always kept for 30 days) ──────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: mediconnect-apk
          path: mediconnect-v1.0.0.apk
          retention-days: 30

      # ── 9. Delete existing release/tag if present ─────────────────────────
      - name: Delete existing release (if any)
        run: |
          gh release delete v1.0.0 --yes --cleanup-tag 2>/dev/null || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 10. Create fresh release + attach APK ─────────────────────────────
      - name: Create GitHub Release with APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0
          name: "MediConnect v1.0.0"
          body: |
            ## 🏥 MediConnect Smart v1.0.0

            AI-powered Healthcare Management Platform

            ### ⬇️ Download
            Download **mediconnect-v1.0.0.apk** below and install on Android 8.0+

            ### ✨ Features
            - 📅 Appointment Booking with doctor search
            - 💊 Digital Prescriptions with PDF export
            - 🔔 Medicine Reminders with notifications
            - 💬 Real-time In-App Chat
            - 🧪 Lab Results upload & viewing
            - 🤖 AI-powered patient summaries (OpenAI)
            - 🎨 Modern professional UI

            ### 📱 Installation
            1. Download `mediconnect-v1.0.0.apk`
            2. Enable **Unknown Sources** in Android Settings
            3. Open the APK file and tap **Install**
            4. Launch app, create account, select role

            ### 📋 Requirements
            - Android 8.0 (API 26) or higher
            - Internet connection
            - ~55 MB free storage
          files: mediconnect-v1.0.0.apk
          draft: false
          prerelease: false
          make_latest: true
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
