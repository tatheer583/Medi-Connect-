name: mediconnect_mobile
description: "MediConnect Smart - Healthcare App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.6.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management (riverpod 3.x — matches generated .g.dart files)
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2

  # Routing — go_router 15.x is the last version requiring only Dart 3.6
  go_router: ">=15.1.3 <16.0.0"

  # Appwrite
  appwrite: ^24.2.0

  # Storage
  shared_preferences: ^2.5.3

  # UI & Fonts
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  animate_do: ^3.3.4
  flutter_animate: ^4.5.0
  fluttertoast: ^8.2.12

  # Notifications
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4

  # PDF generation
  pdf: ^3.11.1
  printing: ^5.13.1
  path_provider: ^2.1.4

  # File handling
  open_filex: ^4.5.1
  file_picker: ^8.1.7

  # HTTP
  http: ^1.2.2

  # UUID
  uuid: ^4.5.1

  # Intl
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: any
  riverpod_generator: any
  build_runner: any

flutter:
  uses-material-design: true
