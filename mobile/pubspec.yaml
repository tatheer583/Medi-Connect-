name: mediconnect_mobile
description: "MediConnect Smart - Healthcare App"
publish_to: 'none'

version: 1.0.0+1

# Use a broad SDK range — let Flutter stable channel pick the right Dart version
environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management — use ^ so pub resolves compatible versions together
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing — v14.x works with Dart >=3.4 (Flutter stable range)
  go_router: ^14.6.3

  # Backend
  appwrite: ^13.0.0
  shared_preferences: ^2.3.3

  # UI & Fonts
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  animate_do: ^3.3.4
  flutter_animate: ^4.5.0
  fluttertoast: ^8.2.12

  # Notifications
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4

  # PDF
  pdf: ^3.11.1
  printing: ^5.13.1
  path_provider: ^2.1.4

  # Files
  open_filex: ^4.5.1
  file_picker: ^8.1.7

  # Network
  http: ^1.2.2

  # Utilities
  uuid: ^4.5.1
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  riverpod_generator: ^2.6.3
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
