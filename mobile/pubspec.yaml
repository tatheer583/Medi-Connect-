name: mediconnect_mobile
description: "MediConnect Smart - Healthcare App"
publish_to: 'none'

version: 1.0.0+1

# ─── SDK requirement ──────────────────────────────────────────────────────────
# Flutter 3.29.x ships Dart 3.7.x
# riverpod 3.x needs Dart >=3.7  ✓
# go_router 16.x needs Dart >=3.7 ✓
environment:
  sdk: ">=3.7.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # ── State management ────────────────────────────────────────────────────────
  # riverpod 3.x — matches the generated .g.dart files in this repo
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2

  # ── Routing ─────────────────────────────────────────────────────────────────
  # go_router 16.x requires Dart >=3.7 — compatible with Flutter 3.29
  go_router: ">=16.0.0 <17.0.0"

  # ── Backend ─────────────────────────────────────────────────────────────────
  appwrite: ^24.2.0
  shared_preferences: ^2.3.3

  # ── UI & Fonts ──────────────────────────────────────────────────────────────
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  animate_do: ^3.3.4
  flutter_animate: ^4.5.0
  fluttertoast: ^8.2.12

  # ── Notifications ───────────────────────────────────────────────────────────
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4

  # ── PDF ─────────────────────────────────────────────────────────────────────
  pdf: ^3.11.1
  printing: ^5.13.1
  path_provider: ^2.1.4

  # ── Files ───────────────────────────────────────────────────────────────────
  open_filex: ^4.5.1
  file_picker: ^8.1.7

  # ── Network ─────────────────────────────────────────────────────────────────
  http: ^1.2.2

  # ── Utilities ───────────────────────────────────────────────────────────────
  uuid: ^4.5.1
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  riverpod_generator: ^4.0.0
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
